<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Bai Liping's website.">
    <title>Bai Liping</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f5ef;
        --surface: #ffffff;
        --text: #1d2520;
        --muted: #647067;
        --line: #dbe4dc;
        --accent: #2f7d5b;
        --accent-dark: #215c43;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(135deg, rgba(255, 250, 240, 0.98), rgba(235, 244, 235, 0.94) 52%, rgba(232, 239, 244, 0.98)),
          repeating-linear-gradient(90deg, rgba(47, 125, 91, 0.035) 0 1px, transparent 1px 54px),
          repeating-linear-gradient(0deg, rgba(184, 111, 60, 0.035) 0 1px, transparent 1px 54px);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .site-header {
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.86);
        backdrop-filter: blur(12px);
      }

      .header-inner,
      main {
        width: min(960px, calc(100% - 32px));
        margin-inline: auto;
      }

      .header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 64px;
        gap: 16px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 800;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        font-weight: 900;
      }

      .header-link {
        min-height: 38px;
        display: inline-flex;
        align-items: center;
        padding: 0 12px;
        border-radius: 8px;
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 700;
      }

      .header-link:hover,
      .header-link:focus-visible {
        color: var(--accent-dark);
        outline: 2px solid rgba(47, 125, 91, 0.25);
      }

      main {
        padding: 54px 0 80px;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: #b86f3c;
        font-size: 0.84rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      h1 {
        max-width: 720px;
        margin: 0;
        font-size: clamp(2.3rem, 5vw, 4rem);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .intro {
        max-width: 620px;
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .page-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 14px;
        margin-top: 36px;
      }

      .page-link {
        display: grid;
        gap: 8px;
        min-height: 136px;
        padding: 18px;
        border: 1px solid rgba(29, 37, 32, 0.1);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.94), rgba(255, 250, 240, 0.72)),
          var(--surface);
        box-shadow: 0 10px 26px rgba(28, 42, 34, 0.08);
        transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
      }

      .page-link:hover,
      .page-link:focus-visible {
        transform: translateY(-2px);
        border-color: rgba(47, 125, 91, 0.45);
        box-shadow: 0 18px 50px rgba(28, 42, 34, 0.12);
        outline: none;
      }

      .page-link span {
        color: var(--accent-dark);
        font-size: 0.82rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      .page-link strong {
        font-size: 1.2rem;
      }

      .page-link p {
        margin: 0;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="/" aria-label="Bai Liping home">
          <span class="brand-mark" aria-hidden="true">B</span>
          <span>Bai Liping</span>
        </a>
        <a class="header-link" href="/sales/">Sales</a>
      </div>
    </header>

    <main>
      <p class="eyebrow">Main website</p>
      <h1>bailiping.com</h1>
      <p class="intro">A small home for current and future pages.</p>

      <section class="page-list" aria-label="Website pages">
        <a class="page-link" href="/sales/">
          <span>Available now</span>
          <strong>Second-hand sales</strong>
          <p>Browse the current sale catalog, item statuses, and pickup details.</p>
        </a>
      </section>
    </main>
  </body>
</html>
