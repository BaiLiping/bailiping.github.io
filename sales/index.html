<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Browse available second-hand moving-sale items in Gothenburg.">
    <title>Second-hand Sales</title>
    <link rel="stylesheet" href="./styles.css?v=20260616-8">
    <link rel="stylesheet" href="/assets/visitor-counter.css?v=20260616-1">
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="./" aria-label="Second-hand Sales home">
          <span class="brand-mark" aria-hidden="true">G</span>
          <span>Second-hand Sales</span>
        </a>
        <nav class="top-nav" aria-label="Primary">
          <a href="/">Home</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero" aria-labelledby="pageTitle">
        <div class="hero-inner">
          <div>
            <p class="eyebrow">Gothenburg</p>
            <h1 id="pageTitle">Second-hand Sales</h1>
          </div>
          <div class="summary" aria-live="polite">
            <span id="summaryTotal">0 items</span>
            <span id="summaryAvailable">0 available</span>
          </div>
        </div>
      </section>

      <section class="page-section toolbar" aria-label="Item filters">
        <div class="filter-row">
          <div class="filter-stack">
            <div class="filter-group" role="tablist" aria-label="Filter by status">
              <button class="filter-button is-active" type="button" data-status="all" role="tab" aria-selected="true">All status</button>
              <button class="filter-button" type="button" data-status="available" role="tab" aria-selected="false">Available</button>
              <button class="filter-button" type="button" data-status="later" role="tab" aria-selected="false">For later</button>
            </div>
            <div class="filter-group" role="tablist" aria-label="Filter by room">
              <button class="filter-button is-active" type="button" data-room="all" role="tab" aria-selected="true">All rooms</button>
              <button class="filter-button" type="button" data-room="kitchen" role="tab" aria-selected="false">Kitchen</button>
              <button class="filter-button" type="button" data-room="bedroom" role="tab" aria-selected="false">Bedroom</button>
              <button class="filter-button" type="button" data-room="storage" role="tab" aria-selected="false">Storage</button>
              <button class="filter-button" type="button" data-room="furniture" role="tab" aria-selected="false">Furniture</button>
              <button class="filter-button" type="button" data-room="electronics" role="tab" aria-selected="false">Electronics</button>
              <button class="filter-button" type="button" data-room="work" role="tab" aria-selected="false">Work</button>
              <button class="filter-button" type="button" data-room="bathroom" role="tab" aria-selected="false">Bathroom</button>
              <button class="filter-button" type="button" data-room="accessories" role="tab" aria-selected="false">Accessories</button>
            </div>
          </div>
          <label class="search-field">
            <span class="sr-only">Search items</span>
            <input id="searchInput" type="search" placeholder="Search product, room, or price">
          </label>
        </div>
      </section>

      <section id="contactPanel" class="page-section contact-panel" hidden></section>

      <section id="items" class="page-section item-region" aria-label="Items for sale">
        <div id="itemGrid" class="item-grid" aria-live="polite"></div>
        <p id="emptyState" class="empty-state" hidden>No items match this filter.</p>
      </section>
    </main>

    <dialog id="itemDialog" class="item-dialog" aria-labelledby="dialogTitle">
      <button id="dialogClose" class="dialog-close" type="button" aria-label="Close item details">&times;</button>
      <div class="dialog-layout">
        <div class="gallery">
          <div class="gallery-stage">
            <img id="dialogImage" class="dialog-image" alt="">
            <button id="galleryPrev" class="gallery-nav gallery-prev" type="button" aria-label="Previous image" hidden>&#8249;</button>
            <button id="galleryNext" class="gallery-nav gallery-next" type="button" aria-label="Next image" hidden>&#8250;</button>
            <span id="imageCounter" class="image-counter" hidden></span>
          </div>
          <div id="thumbStrip" class="thumb-strip" aria-label="Item images"></div>
        </div>
        <div class="dialog-content">
          <span id="dialogStatus" class="status-badge"></span>
          <p id="dialogSeller" class="dialog-seller"></p>
          <h2 id="dialogTitle"></h2>
          <p id="dialogPrice" class="dialog-price"></p>
          <p id="dialogDescription" class="dialog-description"></p>
          <dl id="dialogDetails" class="dialog-details"></dl>
          <a id="dialogWebsite" class="product-link" href="#" target="_blank" rel="noreferrer" hidden>Open product page</a>
          <p id="dialogNotes" class="dialog-notes"></p>
        </div>
      </div>
    </dialog>

    <footer class="site-footer">
      <p>Second-hand Sales</p>
      <p class="visitor-counter" data-visitor-counter aria-live="polite">
        <span>Visitors</span>
        <span class="visitor-counter-value" data-visitor-count>...</span>
      </p>
    </footer>

    <script src="./data/items.js?v=20260616-8"></script>
    <script src="./app.js?v=20260616-8"></script>
    <script src="/assets/visitor-counter.js?v=20260616-1"></script>
  </body>
</html>
